<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>2026 年度班級頒獎盛典 — 穩定相容版</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #070a13; color: #fff; font-family: sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .container { width: 1100px; height: 650px; background: #111827; border-radius: 16px; position: relative; padding: 40px 60px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        
        /* 幻燈片控制 */
        .slide { position: absolute; inset: 40px 60px; display: none; flex-direction: column; justify-content: center; }
        .slide.active { display: flex; }
        
        .title { font-size: 46px; color: #fbbf24; text-align: center; margin-bottom: 30px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 50px; align-items: center; }
        
        /* 懸念舞台 */
        .img-box { width: 320px; height: 320px; position: relative; }
        .mask { position: absolute; inset: 0; background: #1f2937; border: 4px dashed #fbbf24; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 80px; color: #fbbf24; z-index: 5; }
        .photo { width: 320px; height: 320px; border-radius: 50%; border: 6px solid #fbbf24; object-fit: cover; opacity: 0; transform: scale(0.5); transition: all 0.5s ease; }
        
        /* 揭曉得主後的相片樣式 */
        .reveal-winner .mask { display: none; }
        .reveal-winner .photo { opacity: 1; transform: scale(1); }
        
        /* 右側資訊 */
        .name { font-size: 54px; margin-bottom: 20px; opacity: 0; transition: 0.3s; }
        .reveal-winner .name { opacity: 1; }
        
        /* 票數條 */
        .vote-box { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 12px; opacity: 0; }
        .reveal-votes .vote-box { opacity: 1; }
        .bar-bg { background: #374151; height: 30px; border-radius: 15px; overflow: hidden; margin-top: 10px; }
        .bar-fill { background: linear-gradient(90deg, #d97706, #fbbf24); height: 100%; width: 0; transition: width 1.5s ease; }
        .reveal-votes .bar-fill { width: var(--w); }

        /* 控制按鈕 */
        .btn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 12px 35px; font-size: 20px; background: #fbbf24; color: #000; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #f59e0b; }
    </style>
</head>
<body>

<div class="container">

    <button class="btn" id="mainBtn" onclick="nextStage()">開始大賞</button>

    <div class="slide active" style="text-align:center;">
        <h1 style="font-size: 64px; color:#cccc44; margin-bottom: 20px;">2025 - 2026 學年</h1>
        <h1 style="font-size: 64px; color:#fbbf24; margin-bottom: 20px;">4D班 年度頒獎盛典</h1>
        <p style="font-size: 24px; color:#9ca3af;">—  現場揭曉 —</p>
    </div>

    <div class="slide" data-type="award">
        <div class="title">班會無私奉獻獎</div>
        <div class="grid">
            <div class="img-box">
                <div class="mask">🏆</div>
                <img class="photo" src="./01.jpg">
            </div>
            <div>
                <div class="name">得獎者：陳昊揚</div>
                <div class="vote-box">
                    <div style="font-size: 22px;">最終得票：<b style="color:#fbbf24;">15 票</b></div>
                    <div class="bar-bg"><div class="bar-fill" style="--w: 88%;"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="slide" data-type="award">
        <div class="title">體育精神獎</div>
        <div class="grid">
            <div class="img-box">
                <div class="mask">🏆</div>
                <img class="photo" src="./02.jpg">
            </div>
            <div>
                <div class="name">得獎者：陳洛華</div>
                <div class="vote-box">
                    <div style="font-size: 22px;">最終得票：<b style="color:#fbbf24;">12 票</b></div>
                    <div class="bar-bg"><div class="bar-fill" style="--w: 92%;"></div></div>
                </div>
            </div>
        </div>
    </div>
   <div class="slide" data-type="award">
        <div class="title">環保大使獎</div>
        <div class="grid">
            <div class="img-box">
                <div class="mask">🏆</div>
                <img class="photo" src="./03.jpg">
            </div>
            <div>
                <div class="name">得獎者：鍾愷澄</div>
                <div class="vote-box">
                    <div style="font-size: 22px;">最終得票：<b style="color:#fbbf24;">11 票</b></div>
                    <div class="bar-bg"><div class="bar-fill" style="--w: 92%;"></div></div>
                </div>
            </div>
        </div>
    </div>   <div class="slide" data-type="award">
        <div class="title">金螺絲獎 </div>
        <div class="grid">
            <div class="img-box">
                <div class="mask">🏆</div>
                <img class="photo" src="./04.jpg">
            </div>
            <div>
                <div class="name">得獎者：石展彪</div>
                <div class="vote-box">
                    <div style="font-size: 22px;">最終得票：<b style="color:#fbbf24;">20 票</b></div>
                    <div class="bar-bg"><div class="bar-fill" style="--w: 92%;"></div></div>
                </div>
            </div>
        </div>
    </div>   <div class="slide" data-type="award">
        <div class="title">磐石獎</div>
        <div class="grid">

            <div>

                    <div class="bar-bg"><div class="bar-fill" style="--w: 92%;"></div></div>
                </div>
            </div>
        </div>

        <div class="grid">

                <div class="mask">🏆</div>

            <div>

                <div class="vote-box">

            </div>
        </div>
    </div>
    <div class="slide" style="text-align:center;">
        <h1 style="font-size: 54px; color:#fbbf24; margin-bottom: 20px;">恭喜所有獲獎同學！</h1>
        <p style="font-size: 22px; color:#9ca3af;">頒獎典禮圓滿結束</p>
    </div>
</div>

<script>
    let slideIdx = 0;
    let step = 0; // 0:未看票, 1:看票未看人, 2:看完人
    const slides = document.querySelectorAll('.slide');
    const mainBtn = document.getElementById('mainBtn');

    function nextStage() {
        const current = slides[slideIdx];
        const isAward = current.getAttribute('data-type') === 'award';

        if (!isAward) {
            // 非獎項頁（首頁/尾頁），按了直接切下一頁
            current.classList.remove('active');
            slideIdx = (slideIdx + 1) % slides.length;
            slides[slideIdx].classList.add('active');
            
            // 更新按鈕字樣
            if(slides[slideIdx].getAttribute('data-type') === 'award') {
                mainBtn.innerText = "揭曉票數";
            } else {
                mainBtn.innerText = "結束";
            }
            step = 0;
            return;
        }

        // 獎項頁面的三段控制
        if (step === 0) {
            current.classList.add('reveal-votes');
            mainBtn.innerText = "揭曉得主！";
            step = 1;
        } else if (step === 1) {
            current.classList.add('reveal-winner');
            mainBtn.innerText = "下一個獎項";
            step = 2;
        } else if (step === 2) {
            current.classList.remove('active', 'reveal-votes', 'reveal-winner');
            slideIdx = (slideIdx + 1) % slides.length;
            slides[slideIdx].classList.add('active');
            
            if(slides[slideIdx].getAttribute('data-type') === 'award') {
                mainBtn.innerText = "揭曉票數";
            } else {
                mainBtn.innerText = "完成";
                mainBtn.style.display = "none"; // 最後一頁隱藏按鈕
            }
            step = 0;
        }
    }
</script>
</body>
</html>
